<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ollin</title>
<link rel="icon" type="image/svg+xml" href="logo.svg">
<link rel="stylesheet" href="fonts.css">
<style>
/* Shell de la web app monopage — CSS volontairement minimal : chaque vue
   apporte son propre <style> (dans son fragment), actif uniquement tant
   qu'elle est montée. Ici, seulement le socle commun. */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { min-height: 100vh; }
body { background: #0f1117; color: #c9d1e0; font-family: system-ui, -apple-system, sans-serif; }

/* #view ne génère pas de boîte : les éléments de tête du fragment (nav, main…)
   participent à la mise en page comme s'ils étaient enfants directs de <body>
   (le tutoriel attend un body en flex : sidebar + main côte à côte). */
#view { display: contents; }

/* Le canvas WASM est PARTAGÉ : rangé ici (masqué) hors exécution, déplacé dans
   la vue active quand elle en a besoin. */
#canvas-home { display: none; }
</style>
</head>
<body>

<main id="view"></main>

<div id="canvas-home"><canvas id="canvas" tabindex="0" style="display:none"></canvas></div>

<script type="module">
  // Import cache-busté du routeur (comme les autres modules du projet).
  import('./app.js?v=' + Date.now())
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ollin — exécution autonome</title>
  <style>
    :root { --bg:#0e0e12; --fg:#e6e6ee; --dim:#8a8a99; --accent:#7c83ff; --border:#2a2a36; }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; background: var(--bg); color: var(--fg);
                 font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace; }
    body { display: flex; flex-direction: column; }
    #bar { display: flex; align-items: center; gap: 12px; padding: 8px 14px;
           border-bottom: 1px solid var(--border); font-size: 13px; flex: none; }
    #bar a { color: var(--accent); text-decoration: none; display: flex; align-items: center; gap: 6px; }
    #bar a:hover { text-decoration: underline; }
    #bar .sp { flex: 1; }
    #status { color: var(--dim); font-size: 12px; }
    #stage { flex: 1; display: flex; align-items: center; justify-content: center; overflow: auto; padding: 12px; }
    canvas { display: none; background: #000; box-shadow: 0 0 0 1px var(--border); }
    #out { display: none; white-space: pre-wrap; width: 100%; max-width: 900px;
           font-size: 13px; line-height: 1.5; padding: 12px; }
    #out.err { color: #ff6b6b; }
    #out.ok  { color: #b8f5c0; }
  </style>
</head>
<body>
  <div id="bar">
    <a href="playground.html" title="Retour à l'éditeur">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M9.5 3L5 8l4.5 5"/></svg>
      Éditeur
    </a>
    <span class="sp"></span>
    <span id="status">Chargement…</span>
  </div>
  <div id="stage">
    <canvas id="canvas" tabindex="0"></canvas>
    <pre id="out"></pre>
  </div>

  <script>
    const statusEl = document.getElementById('status');
    const canvasEl = document.getElementById('canvas');
    const outEl    = document.getElementById('out');
    let   prints   = '';

    function showText(text) {
      outEl.style.display = 'block';
      canvasEl.style.display = 'none';
      const body = (text && String(text).length) ? String(text) : (prints || '(aucune sortie)');
      outEl.textContent = body;
      outEl.className = (text && String(text).startsWith('error:')) ? 'err' : 'ok';
    }

    const code = localStorage.getItem('ollin_run_code');
    if (code === null) {
      statusEl.textContent = '';
      showText("error: aucun script. Ouvre ce mode depuis l'éditeur (bouton « Autonome »).");
    } else {
      const wasmScript = document.createElement('script');
      const cacheBust  = Date.now();
      wasmScript.src   = 'wasm/ollin.js?' + cacheBust;
      wasmScript.onload = () => {
        const wasmDir = wasmScript.src.replace(/\?.*$/, '').replace(/[^/]*$/, '');
        OllinModule({
          locateFile: f => wasmDir + f + '?' + cacheBust,
          canvas:   canvasEl,
          print:    t => { prints += t + '\n'; },
          printErr: t => { prints += t + '\n'; },
        }).then(m => {
          // précharge les images éventuelles
          try {
            const imgs = JSON.parse(localStorage.getItem('ollin_run_images') || '[]');
            for (const im of imgs) m.preloadImage(im.name, im.b64, im.ext);
          } catch (_) {}
          statusEl.textContent = '';
          let out;
          try { out = m.execute(code); }
          catch (e) { showText('error: ' + (e?.message ?? e)); return; }
          // graphics.canvas() rend le canvas visible (display:block)
          if (canvasEl.style.display === 'block') {
            statusEl.textContent = 'En cours…';
          } else {
            showText(out);
          }
        }).catch(err => {
          statusEl.textContent = '';
          showText('error: WASM — ' + (err?.message ?? err));
        });
      };
      wasmScript.onerror = () => { statusEl.textContent = ''; showText('error: WASM introuvable'); };
      document.head.appendChild(wasmScript);
    }
  </script>
</body>
</html>

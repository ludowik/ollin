<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Ollin — Playground</title>
<link rel="icon" type="image/svg+xml" href="logo.svg">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:      #0f1117;
  --surface: #1a1d2e;
  --surface2:#242742;
  --border:  #2e3150;
  --text:    #c9d1e0;
  --dim:     #7c85a2;
  --accent:  #7c83ff;
  --green:   #4ade80;
  --red:     #f87171;
  --yellow:  #fbbf24;
  --mono:    'JetBrains Mono','Fira Code','Cascadia Code',Consolas,monospace;
}

html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: system-ui,-apple-system,sans-serif; }

/* ── toolbar ─────────────────────────────────────────────────────────────── */
#toolbar {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 0 14px;
  height: 44px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.logo {
  font-weight: 700;
  font-size: 16px;
  color: var(--accent);
  letter-spacing: -0.3px;
  margin-right: 4px;
  text-decoration: none;
  flex-shrink: 0;
}

.sep { width: 1px; height: 20px; background: var(--border); }

#examples {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  font-size: 12px;
  padding: 4px 8px;
  border-radius: 5px;
  cursor: pointer;
  outline: none;
  max-width: 180px;
}
#examples:focus { border-color: var(--accent); }

.spacer { flex: 1; }

#status { font-size: 12px; color: var(--dim); }

#run-btn {
  display: flex;
  align-items: center;
  gap: 6px;
  background: var(--accent);
  color: #fff;
  border: 1px solid transparent;
  border-radius: 6px;
  padding: 6px 14px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: opacity 0.15s, background 0.15s, border-color 0.15s, color 0.15s;
  flex-shrink: 0;
}
#run-btn:hover   { opacity: 0.85; }
#run-btn:disabled{ opacity: 0.4; cursor: default; }
#run-btn.running {
  background: transparent;
  border-color: var(--red);
  color: var(--red);
}
#run-btn.running:hover { opacity: 1; background: rgba(248,113,113,0.12); }

#stop-btn {
  display: flex;
  align-items: center;
  gap: 6px;
  background: transparent;
  border: 1px solid var(--red);
  color: var(--red);
  border-radius: 6px;
  padding: 6px 14px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: opacity 0.15s, background 0.15s;
  flex-shrink: 0;
}
#stop-btn:disabled { opacity: 0.3; cursor: default; }
#stop-btn:not(:disabled):hover { background: rgba(248,113,113,0.12); }

#run-btn kbd {
  font-size: 10px;
  background: rgba(255,255,255,0.15);
  border-radius: 3px;
  padding: 1px 4px;
  font-family: var(--mono);
  font-weight: 400;
}

/* ── layout ──────────────────────────────────────────────────────────────── */
#layout {
  display: flex;
  height: calc(100vh - 44px);
}

#editor-pane {
  flex: 1 1 50%;
  min-width: 0;
  min-height: 0;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  border-right: 1px solid var(--border);
}

#editor-wrap {
  flex: 1;
  min-height: 0;
  overflow: hidden;
  position: relative;
}

/* Make CM fill the pane */
#editor-wrap .cm-editor { height: 100%; border-radius: 0; border: none; }
#editor-wrap .cm-scroller { height: 100%; overflow: auto; }

#output-pane {
  flex: 1 1 50%;
  min-width: 0;
  display: flex;
  flex-direction: column;
  background: var(--bg);
  overflow: auto;
}



#output {
  flex: 1;
  padding: 16px 18px;
  font-family: var(--mono);
  font-size: 13px;
  line-height: 1.65;
  white-space: pre-wrap;
  word-break: break-all;
  overflow-y: auto;
  color: var(--dim);
  font-style: italic;
}
#output.ok  { color: var(--green); font-style: normal; }
#output.err { color: var(--red);   font-style: normal; }

canvas#canvas {
  display: none;
  margin: auto;
}

/* ── divider (drag to resize) ─────────────────────────────────────────────── */
#divider {
  width: 5px;
  cursor: col-resize;
  background: var(--border);
  flex-shrink: 0;
  transition: background 0.15s;
}
#divider:hover, #divider.dragging { background: var(--accent); }

/* ── mobile ──────────────────────────────────────────────────────────────── */
@media (max-width: 640px) {
  #layout { flex-direction: column; }
  #editor-pane { flex: 1 1 55%; border-right: none; border-bottom: 1px solid var(--border); }
  #output-pane { flex: 1 1 45%; min-height: 0; overflow: hidden; }
  #divider { width: 100%; height: 6px; cursor: row-resize; }

  /* Police réduite — maximum-scale=1.0 dans le viewport empêche le zoom iOS */
  #editor-wrap .cm-editor  { font-size: 12px; }
  #editor-wrap .cm-content { font-size: 12px; }
  /* Scroll horizontal fluide sur iOS */
  #editor-wrap .cm-scroller { overflow-x: auto; -webkit-overflow-scrolling: touch; }

  /* toolbar compact */
  #toolbar { gap: 5px; padding: 0 8px; }
  .btn-label { display: none; }
  #run-btn kbd { display: none; }
  #status { display: none; }
  #examples { max-width: 90px; font-size: 11px; }
  #img-btn  { padding: 6px 8px; }
  #run-btn  { padding: 6px 10px; }
  #stop-btn { padding: 6px 10px; }
  #copy-btn { padding: 6px 10px !important; }
}
</style>
<script type="importmap">
{
  "imports": {
    "@codemirror/state":         "https://esm.sh/@codemirror/state@6",
    "@codemirror/view":          "https://esm.sh/@codemirror/view@6",
    "@codemirror/language":      "https://esm.sh/@codemirror/language@6",
    "@codemirror/commands":      "https://esm.sh/@codemirror/commands@6",
    "@codemirror/autocomplete":  "https://esm.sh/@codemirror/autocomplete@6",
    "@lezer/highlight":          "https://esm.sh/@lezer/highlight@1"
  }
}
</script>
</head>
<body>

<div id="toolbar">
  <a href="index.html" class="logo">Ollin</a>
  <select id="examples" title="Charger un exemple" disabled><option>Chargement…</option></select>
  <div class="spacer"></div>
  <span id="status">Chargement…</span>
  <input type="file" id="img-file-input" accept="image/png,image/jpeg,image/gif,image/webp,image/bmp" multiple style="display:none">
  <label for="img-file-input" id="img-btn" title="Charger des images (PNG, JPG…) pour image.load()" style="display:flex;align-items:center;gap:5px;background:transparent;border:1px solid var(--border);color:var(--dim);border-radius:6px;padding:6px 12px;font-size:12px;font-weight:500;cursor:pointer;transition:background 0.15s,border-color 0.15s,color 0.15s;user-select:none">
    <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="1" y="3" width="14" height="10" rx="1.5"/><path d="M1 10l4-3 3 2.5 3-3.5 4 4"/><circle cx="11.5" cy="6.5" r="1.2" fill="currentColor" stroke="none"/></svg>
    <span class="btn-label" id="img-btn-label">Images</span>
  </label>
  <button id="copy-btn" title="Copier le code" style="display:flex;align-items:center;gap:5px;background:transparent;border:1px solid var(--accent);color:var(--accent);border-radius:6px;padding:6px 12px;font-size:12px;font-weight:500;cursor:pointer;transition:background 0.15s,opacity 0.15s" onmouseover="this.style.background='rgba(124,131,255,0.12)'" onmouseout="this.style.background='transparent'">
    <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="5.5" y="5.5" width="9" height="9" rx="1.5"/><path d="M10.5 5.5V3a1 1 0 00-1-1H3a1 1 0 00-1 1h2.5"/></svg>
    <span class="btn-label">Copier</span>
  </button>
  <button id="run-btn" disabled>
    <svg width="10" height="10" viewBox="0 0 16 16" fill="currentColor"><path d="M3 2l11 6-11 6V2z"/></svg>
    <span class="btn-label">Exécuter</span><kbd>Ctrl+↵</kbd>
  </button>
  <button id="stop-btn" disabled title="Pause / Reprendre" style="display:none">
    <svg width="10" height="10" viewBox="0 0 16 16" fill="currentColor"><rect x="2" y="2" width="4" height="12" rx="1"/><rect x="10" y="2" width="4" height="12" rx="1"/></svg>
    <span class="btn-label">Pause</span>
  </button>
</div>

<div id="layout">
  <div id="editor-pane">
    <div id="editor-wrap"></div>
  </div>
  <div id="divider"></div>
  <div id="output-pane">
    <div id="output">Prêt.</div>
    <canvas id="canvas"></canvas>
  </div>
</div>

<script type="module">
import { EditorState }                                                    from '@codemirror/state'
import { EditorView, lineNumbers, keymap, drawSelection,
         highlightActiveLine, highlightActiveLineGutter }                 from '@codemirror/view'
import { defaultKeymap, historyKeymap, history, indentWithTab }           from '@codemirror/commands'
import { StreamLanguage, syntaxHighlighting, HighlightStyle, indentUnit } from '@codemirror/language'
import { tags }                                                           from '@lezer/highlight'
import { autocompletion, completionKeymap, acceptCompletion }             from '@codemirror/autocomplete'

// ── Ollin syntax ──────────────────────────────────────────────────────────
const KEYWORDS = new Set([
  'var','global','const','while','do','for','in','if','then','elseif','end',
  'break','true','false','nil','try','catch','throw','else','func','return',
  'import','as','or','and','not','class','extends','super','self',
  'switch','case','default'
])
const BUILTINS = new Set(['print','printf','time','assert','len','typeof','Color','math','graphics','string','colors','window','image'])

const ollinLang = StreamLanguage.define({
  name: 'ollin',
  startState: () => ({ block: false }),
  token(stream, state) {
    if (state.block) {
      if (stream.match('###')) { state.block = false; return 'comment' }
      stream.next(); return 'comment'
    }
    if (stream.match('###')) { state.block = true; return 'comment' }
    if (stream.eatSpace()) return null
    if (stream.match('##')) { stream.skipToEnd(); return 'comment' }
    if (stream.peek() === '"') {
      stream.next()
      while (!stream.eol()) { const ch = stream.next(); if (ch === '"') break; if (ch === '\\') stream.next() }
      return 'string'
    }
    if (stream.match(/^\.\d[\d_]*/)) return 'number'
    if (stream.match(/^\d[\d_]*(?:\.[\d_]+)?/)) return 'number'
    if (stream.match(/^[a-zA-Z_]\w*/)) {
      const w = stream.current()
      if (KEYWORDS.has(w)) return 'keyword'
      if (BUILTINS.has(w)) return 'atom'
      return null
    }
    if (stream.match(/^(\*\*|\/\/|\+=|-=|\*=|\/=|%=|==|>=|<=|<>|<<|>>|\.\.\.|\.\.)/) ||
        stream.match(/^[+\-*/%><&|^~\[\]{}:.]/)) return 'operator'
    stream.next(); return null
  }
})

const ollinHighlight = HighlightStyle.define([
  { tag: tags.keyword,  color: '#569CD6' },
  { tag: tags.atom,     color: '#DCDCAA' },
  { tag: tags.number,   color: '#B5CEA8' },
  { tag: tags.string,   color: '#CE9178' },
  { tag: tags.comment,  color: '#6A9955', fontStyle: 'italic' },
  { tag: tags.operator, color: '#c9d1e0' },
])

const ollinTheme = EditorView.theme({
  '&': { background: '#1a1d2e', color: '#c9d1e0', fontSize: '13.5px', height: '100%' },
  '.cm-scroller': { fontFamily: "'JetBrains Mono','Fira Code','Cascadia Code',Consolas,monospace", lineHeight: '1.65' },
  '.cm-content': { padding: '14px 0', caretColor: '#7c83ff' },
  '.cm-line': { padding: '0 18px' },
  '.cm-gutters': { background: '#1a1d2e', color: '#3d4463', border: 'none', borderRight: '1px solid #2e3150' },
  '.cm-lineNumbers .cm-gutterElement': { padding: '0 10px 0 8px', minWidth: '2.8em', fontSize: '11.5px' },
  '.cm-activeLine': { background: 'rgba(255,255,255,0.03)' },
  '.cm-activeLineGutter': { background: 'rgba(255,255,255,0.03)', color: '#7c85a2' },
  '&.cm-focused': { outline: 'none' },
  '&.cm-focused .cm-cursor': { borderLeftColor: '#7c83ff', borderLeftWidth: '2px' },
  '.cm-selectionBackground': { background: 'rgba(255,255,255,0.18) !important' },
  '&.cm-focused .cm-selectionBackground': { background: 'rgba(255,255,255,0.25) !important' },

  /* autocomplete dropdown */
  '.cm-tooltip.cm-tooltip-autocomplete': { background: '#1e2133', border: '1px solid #3a3f5c', borderRadius: '6px', boxShadow: '0 4px 16px rgba(0,0,0,0.5)', padding: '2px 0' },
  '.cm-tooltip-autocomplete > ul': { fontFamily: "'JetBrains Mono','Fira Code',Consolas,monospace", fontSize: '12.5px', maxHeight: '280px' },
  '.cm-tooltip-autocomplete > ul > li': { padding: '3px 10px 3px 6px', color: '#c9d1e0', lineHeight: '1.5' },
  '.cm-tooltip-autocomplete > ul > li[aria-selected]': { background: '#2d3259', color: '#ffffff' },
  '.cm-completionLabel': { color: '#c9d1e0' },
  '.cm-completionDetail': { color: '#7c85a2', fontStyle: 'italic', marginLeft: '6px' },
  '.cm-completionIcon': { opacity: 0.7, width: '16px', marginRight: '4px' },
  '.cm-completionIcon-keyword': { color: '#569CD6' },
  '.cm-completionIcon-function': { color: '#DCDCAA' },
  '.cm-completionIcon-constant': { color: '#4FC1FF' },
  '.cm-completionIcon-namespace': { color: '#C586C0' },
  '[aria-selected] .cm-completionLabel': { color: '#ffffff' },
  '[aria-selected] .cm-completionDetail': { color: '#a0aabf' },
})

// ── Autocompletion ────────────────────────────────────────────────────────
const kw  = label => ({ label, type: 'keyword' })
const fn  = (label, detail) => ({ label, type: 'function', detail })
const cst = (label, detail) => ({ label, type: 'constant', detail })

const AC_KEYWORDS = [
  'var','global','const','func','if','then','else','elseif','end',
  'while','do','for','in','return','break','true','false','nil',
  'try','catch','throw','class','extends','super','self','import','as',
  'or','and','not','switch','case','default',
].map(kw)

const AC_BUILTINS = [
  fn('print',  'print(...)'),    fn('printf', 'printf(fmt, ...)'),
  fn('assert', 'assert(cond [, msg])'), fn('time', 'time() → float'),
  fn('typeof', 'typeof(v) → string'),   fn('Color', 'Color(r, g, b [, a])'),
  fn('len',    'len(v) → int'),
]

const MODULE_MEMBERS = {
  math: [
    cst('math.PI','3.14159…'), cst('math.TAU','6.28318…'), cst('math.E','2.71828…'), cst('math.INF','Infinity'),
    fn('math.abs','abs(x)'),       fn('math.sign','sign(x)'),      fn('math.floor','floor(x)'),
    fn('math.ceil','ceil(x)'),     fn('math.round','round(x)'),    fn('math.trunc','trunc(x)'),
    fn('math.sqrt','sqrt(x)'),     fn('math.pow','pow(x,n)'),      fn('math.clamp','clamp(x,lo,hi)'),
    fn('math.min','min(...)'),     fn('math.max','max(...)'),       fn('math.map','map(x,ilo,ihi,olo,ohi)'),
    fn('math.exp','exp(x)'),       fn('math.log','log(x)'),        fn('math.log2','log2(x)'),
    fn('math.log10','log10(x)'),   fn('math.logn','logn(x,n)'),   fn('math.frac','frac(x)'),
    fn('math.sin','sin(x)'),       fn('math.cos','cos(x)'),        fn('math.tan','tan(x)'),
    fn('math.asin','asin(x)'),     fn('math.acos','acos(x)'),      fn('math.atan','atan(x)'),
    fn('math.atan2','atan2(y,x)'), fn('math.deg','deg(rad)'),      fn('math.rad','rad(deg)'),
    fn('math.is_nan','is_nan(x)'), fn('math.is_inf','is_inf(x)'),
    fn('math.rand','rand([lo,hi])'), fn('math.rand_int','rand_int([lo,]hi)'), fn('math.seed','seed(n)'),
  ],
  graphics: [
    fn('graphics.canvas','canvas(w,h,title)'),     fn('graphics.run','run(callback)'),
    fn('graphics.clear','clear(color)'),
    fn('graphics.strokeSize','strokeSize(n)'),     fn('graphics.stroke','stroke([color])'),
    fn('graphics.fill','fill([color])'),
    fn('graphics.line','line(x1,y1,x2,y2)'),       fn('graphics.rect','rect(x,y,w,h)'),
    fn('graphics.circle','circle(x,y,r)'),          fn('graphics.ellipse','ellipse(x,y,rx,ry)'),
    fn('graphics.point','point(x,y)'),
    fn('graphics.polygon','polygon(pts)'),          fn('graphics.polyline','polyline(pts)'),
    fn('graphics.push','push()'),                   fn('graphics.pop','pop()'),
    fn('graphics.translate','translate(x,y)'),      fn('graphics.rotate','rotate(deg)'),
    fn('graphics.scale','scale(sx[,sy])'),          fn('graphics.resetTransform','resetTransform()'),
    fn('graphics.sprite','sprite(img,x,y[,w,h])'),
    fn('graphics.draw_text','draw_text(text,x,y,size[,color])'),
    fn('graphics.fps','fps()→int'),                fn('graphics.is_open','is_open()→bool'),
    fn('graphics.close','close()'),                fn('graphics.quit','quit()'),
  ],
  image: [
    fn('image.load','load(path) → img'),
    fn('image.load_data','load_data(format, base64) → img'),
    fn('image.create','create(w, h) → img'),
    fn('image.begin_draw','begin_draw(img)'),
    fn('image.end_draw','end_draw()'),
    fn('image.draw','draw(img, x, y [, w, h [, tint]])'),
    fn('image.unload','unload(img)'),
    fn('image.set_pixel','set_pixel(img, x, y, color)'),
    fn('image.get_pixel','get_pixel(img, x, y) → color'),
    fn('image.begin_pixels','begin_pixels(img)'),
    fn('image.end_pixels','end_pixels(img)'),
  ],
  colors: [
    cst('colors.BLACK',''),   cst('colors.WHITE',''),  cst('colors.RED',''),
    cst('colors.GREEN',''),   cst('colors.BLUE',''),   cst('colors.YELLOW',''),
    cst('colors.GRAY',''),    cst('colors.ORANGE',''), cst('colors.PINK',''),
    cst('colors.PURPLE',''),  cst('colors.BROWN',''),  cst('colors.DARKGRAY',''),
    cst('colors.SKYBLUE',''), cst('colors.LIME',''),   cst('colors.MAGENTA',''),
  ],
  string: [
    fn('string.upper','upper(s)'), fn('string.lower','lower(s)'), fn('string.trim','trim(s)'),
    fn('string.ltrim','ltrim(s)'), fn('string.rtrim','rtrim(s)'),
  ],
  window: [
    cst('window.width','largeur de la zone de rendu (px)'),
    cst('window.height','hauteur de la zone de rendu (px)'),
  ],
}

function ollinComplete(context) {
  const dotWord = context.matchBefore(/[a-zA-Z_]\w*\.\w*/)
  if (dotWord) {
    const dot    = dotWord.text.indexOf('.')
    const prefix = dotWord.text.slice(0, dot)
    const members = MODULE_MEMBERS[prefix]
    if (members) {
      return {
        from: dotWord.from + dot + 1,
        options: members.map(m => ({ ...m, label: m.label.slice(prefix.length + 1) })),
        validFor: /^\w*$/,
      }
    }
    return null
  }
  const word = context.matchBefore(/\w+/)
  if (!word || (word.from === word.to && !context.explicit)) return null
  const moduleNames = Object.keys(MODULE_MEMBERS).map(m => ({ label: m, type: 'namespace' }))
  return {
    from: word.from,
    options: [...AC_KEYWORDS, ...AC_BUILTINS, ...moduleNames],
    validFor: /^\w*$/,
  }
}

// ── Editor ────────────────────────────────────────────────────────────────
const CODE_KEY  = 'ollin-pg-code'
const INIT_CODE = localStorage.getItem(CODE_KEY) ?? 'print("hello world!")\n'

let saveTimer = null

const view = new EditorView({
  state: EditorState.create({
    doc: INIT_CODE,
    extensions: [
      ollinLang, syntaxHighlighting(ollinHighlight), lineNumbers(), ollinTheme,
      history(), drawSelection(), highlightActiveLine(), highlightActiveLineGutter(),
      keymap.of([{ key: 'Tab', run: acceptCompletion }, ...completionKeymap, indentWithTab, ...defaultKeymap, ...historyKeymap]),
      keymap.of([{ key: 'Alt-Enter', run: () => { run(); return true } }]),
      indentUnit.of('    '),
      autocompletion({ override: [ollinComplete], activateOnTyping: true }),
      EditorView.updateListener.of(update => {
        if (!update.docChanged) return
        clearTimeout(saveTimer)
        saveTimer = setTimeout(() => localStorage.setItem(CODE_KEY, view.state.doc.toString()), 500)
      }),
    ]
  }),
  parent: document.getElementById('editor-wrap'),
})

view.focus()
localStorage.setItem('ollin-last-page', 'playground.html')

// ── Examples ──────────────────────────────────────────────────────────────
const sel = document.getElementById('examples')
let examples = []

async function loadExamples() {
  const list = await fetch('samples/index.json', { cache: 'no-cache' }).then(r => r.json())
  examples = [{ name: '— Exemples —', file: null }, ...list]
  sel.innerHTML = ''
  examples.forEach((ex, i) => {
    const opt = document.createElement('option')
    opt.value = i
    opt.textContent = ex.name
    sel.appendChild(opt)
  })
  sel.disabled = false
}
loadExamples()

sel.addEventListener('change', async () => {
  const ex = examples[+sel.value]
  if (!ex || !ex.file) return
  sel.value = 0
  const code = await fetch('samples/' + ex.file, { cache: 'no-cache' }).then(r => r.text())
  view.dispatch({ changes: { from: 0, to: view.state.doc.length, insert: code } })
  view.focus()
})

// ── Output ────────────────────────────────────────────────────────────────
const outputEl   = document.getElementById('output')
const canvasEl   = document.getElementById('canvas')
const outputPane = document.getElementById('output-pane')
const outputHdr  = document.getElementById('output-header')

const runBtn   = document.getElementById('run-btn')
const stopBtn  = document.getElementById('stop-btn')
let   isRunning = false
let   isPaused  = false

const ICON_RUN   = '<svg width="10" height="10" viewBox="0 0 16 16" fill="currentColor"><path d="M3 2l11 6-11 6V2z"/></svg>'
const ICON_STOP  = '<svg width="10" height="10" viewBox="0 0 16 16" fill="currentColor"><rect x="2" y="2" width="12" height="12" rx="2"/></svg>'
const ICON_PAUSE = '<svg width="10" height="10" viewBox="0 0 16 16" fill="currentColor"><rect x="2" y="2" width="4" height="12" rx="1"/><rect x="10" y="2" width="4" height="12" rx="1"/></svg>'
const ICON_RESUME= '<svg width="10" height="10" viewBox="0 0 16 16" fill="currentColor"><path d="M3 2l11 6-11 6V2z"/></svg>'

function setRunning(running) {
  isRunning = running
  if (running) {
    runBtn.classList.add('running')
    runBtn.innerHTML = ICON_STOP + '<span class="btn-label"> Arrêter</span>'
    stopBtn.style.display = 'flex'
    stopBtn.disabled = false
  } else {
    runBtn.classList.remove('running')
    runBtn.innerHTML = ICON_RUN + '<span class="btn-label"> Exécuter</span><kbd>Ctrl+↵</kbd>'
    stopBtn.style.display = 'none'
    stopBtn.disabled = true
    isPaused = false
    stopBtn.innerHTML = ICON_PAUSE + '<span class="btn-label"> Pause</span>'
  }
}

function clearAndStop() {
  try { ollin && ollin.pauseMainLoop() } catch(_) {}
  canvasEl.style.display = 'none'
  outputEl.style.display = 'block'
  if (outputHdr) outputHdr.style.display = 'flex'
  outputEl.textContent   = ''
  outputEl.className     = ''
  outputPane.style.overflow = ''
  setRunning(false)
}

function showOutput(text) {
  canvasEl.style.display = 'none'
  outputEl.style.display = 'block'
  if (outputHdr) outputHdr.style.display = 'flex'
  outputPane.style.overflow = ''
  if (!text) {
    outputEl.textContent = '(aucune sortie)'
    outputEl.className   = ''
  } else if (text.startsWith('error:')) {
    outputEl.textContent = text
    outputEl.className   = 'err'
  } else {
    outputEl.textContent = text
    outputEl.className   = 'ok'
  }
}

// ── Run ───────────────────────────────────────────────────────────────────
let ollin = null

function run() {
  if (!ollin) return
  if (isRunning) { clearAndStop(); return }
  try { ollin.pauseMainLoop() } catch(_) {}
  setRunning(false)
  outputEl.className = ''
  const code = view.state.doc.toString()
  const out  = ollin.execute(code)
  if (canvasEl.style.display === 'block') {
    outputPane.style.overflow = 'hidden'
    if (outputHdr) outputHdr.style.display = 'none'
    setRunning(true)
    return
  }
  showOutput(out)
}

runBtn.addEventListener('click', run)
stopBtn.addEventListener('click', () => {
  if (isPaused) {
    try { ollin.resumeMainLoop() } catch(_) {}
    isPaused = false
    stopBtn.innerHTML = ICON_PAUSE + '<span class="btn-label"> Pause</span>'
  } else {
    try { ollin.pauseMainLoop() } catch(_) {}
    isPaused = true
    stopBtn.innerHTML = ICON_RESUME + '<span class="btn-label"> Reprendre</span>'
  }
})

// ── Copy ──────────────────────────────────────────────────────────────────
const copyBtn = document.getElementById('copy-btn')
const ICON_COPY = '<svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="5.5" y="5.5" width="9" height="9" rx="1.5"/><path d="M10.5 5.5V3a1 1 0 00-1-1H3a1 1 0 00-1 1v7a1 1 0 001 1h2.5"/></svg>'
const ICON_OK   = '<svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 8l4 4 6-6"/></svg>'
copyBtn.addEventListener('click', () => {
  navigator.clipboard.writeText(view.state.doc.toString()).then(() => {
    copyBtn.innerHTML = ICON_OK + '<span class="btn-label"> Copié !</span>'
    copyBtn.style.color        = 'var(--green)'
    copyBtn.style.borderColor  = 'var(--green)'
    setTimeout(() => {
      copyBtn.innerHTML = ICON_COPY + '<span class="btn-label"> Copier</span>'
      copyBtn.style.color = ''
      copyBtn.style.borderColor = ''
    }, 1500)
  })
})

// ── Image upload ──────────────────────────────────────────────────────────
const imgFileInput = document.getElementById('img-file-input')
const imgBtnLabel  = document.getElementById('img-btn-label')
const imgBtn       = document.getElementById('img-btn')
const loadedImages = new Map()  // name → {b64, ext}

imgFileInput.addEventListener('change', () => {
  const files = Array.from(imgFileInput.files)
  if (!files.length) return
  let done = 0
  files.forEach(file => {
    const ext  = file.name.split('.').pop().toLowerCase()
    const name = file.name
    const reader = new FileReader()
    reader.onload = e => {
      const dataUrl = e.target.result               // "data:image/png;base64,xxxx"
      const b64     = dataUrl.split(',')[1] ?? ''
      loadedImages.set(name, { b64, ext })
      if (ollin) ollin.preloadImage(name, b64, ext)
      done++
      const n = loadedImages.size
      imgBtnLabel.textContent = n + ' image' + (n > 1 ? 's' : '')
      imgBtn.style.borderColor = 'var(--green)'
      imgBtn.style.color       = 'var(--green)'
    }
    reader.readAsDataURL(file)
  })
  imgFileInput.value = ''
})

// ── WASM ──────────────────────────────────────────────────────────────────
const statusEl = document.getElementById('status')

const wasmScript    = document.createElement('script')
const cacheBust     = Date.now()
wasmScript.src      = 'wasm/ollin.js?' + cacheBust
wasmScript.onload   = () => {
  const wasmDir = wasmScript.src.replace(/\?.*$/, '').replace(/[^/]*$/, '')
  OllinModule({
    locateFile: f => wasmDir + f + '?' + cacheBust,
    canvas:   canvasEl,
    print:    () => {},
    printErr: () => {},
  }).then(m => {
    ollin              = m
    runBtn.disabled    = false
    statusEl.textContent = 'Prêt ✓'
    setTimeout(() => { statusEl.textContent = '' }, 2000)
  }).catch(err => {
    statusEl.textContent = 'Erreur WASM : ' + (err?.message ?? err)
  })
}
wasmScript.onerror = () => { statusEl.textContent = 'WASM introuvable' }
document.head.appendChild(wasmScript)

// ── Divider resize ────────────────────────────────────────────────────────
const divider    = document.getElementById('divider')
const editorPane = document.getElementById('editor-pane')
let   dragging   = false

const SPLIT_KEY = 'ollin-pg-split'

function applySplit(pct) {
  editorPane.style.flex = `0 0 ${pct}%`
  outputPane.style.flex = `0 0 ${100 - pct}%`
}

const savedSplit = parseFloat(localStorage.getItem(SPLIT_KEY))
if (savedSplit >= 15 && savedSplit <= 85) applySplit(savedSplit)

function startDrag(e) {
  dragging = true
  divider.classList.add('dragging')
  e.preventDefault()
}
function moveDrag(clientX, clientY) {
  if (!dragging) return
  const layout = document.getElementById('layout')
  const rect   = layout.getBoundingClientRect()
  const mobile = window.innerWidth <= 640
  const pct = mobile
    ? Math.min(85, Math.max(15, (clientY - rect.top)  / rect.height * 100))
    : Math.min(85, Math.max(15, (clientX - rect.left) / rect.width  * 100))
  applySplit(pct)
}
function endDrag() {
  if (!dragging) return
  dragging = false
  divider.classList.remove('dragging')
  const pct = parseFloat(editorPane.style.flex.split(' ')[2])
  if (!isNaN(pct)) localStorage.setItem(SPLIT_KEY, pct)
}

divider.addEventListener('mousedown',  e => startDrag(e))
document.addEventListener('mousemove', e => moveDrag(e.clientX, e.clientY))
document.addEventListener('mouseup',   () => endDrag())

divider.addEventListener('touchstart', e => startDrag(e), { passive: false })
document.addEventListener('touchmove',  e => { if (dragging) { moveDrag(e.touches[0].clientX, e.touches[0].clientY); e.preventDefault() } }, { passive: false })
document.addEventListener('touchend',  () => endDrag())
</script>

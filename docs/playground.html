<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Ollin — Playground</title>
<link rel="icon" type="image/svg+xml" href="logo.svg">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:      #0f1117;
  --surface: #1a1d2e;
  --surface2:#242742;
  --border:  #2e3150;
  --text:    #c9d1e0;
  --dim:     #7c85a2;
  --accent:  #7c83ff;
  --green:   #4ade80;
  --red:     #f87171;
  --yellow:  #fbbf24;
  --mono:    'JetBrains Mono','Fira Code','Cascadia Code',Consolas,monospace;
}

html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: system-ui,-apple-system,sans-serif; -webkit-text-size-adjust: 100%; text-size-adjust: 100%; }

/* ── toolbar ─────────────────────────────────────────────────────────────── */
#toolbar {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 0 14px;
  height: 44px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  /* PAS d'overflow ici : overflow-x:auto forcerait overflow-y:auto et
     rognerait le menu déroulant (positionné sous la toolbar). Le mode
     icônes-seules (@media ≤1080px) suffit à tout faire tenir. */
}

/* Toolbar large mais fenêtre étroite : boutons en icônes seules pour tout garder
   visible (dont Exécuter/Pause) bien avant le passage en layout mobile. */
@media (max-width: 1080px) {
  .btn-label { display: none; }
  #run-btn kbd { display: none; }
  #project-label { display: none; }
}

.logo {
  font-weight: 700;
  font-size: 16px;
  color: var(--accent);
  letter-spacing: -0.3px;
  margin-right: 4px;
  text-decoration: none;
  flex-shrink: 0;
}

.sep { width: 1px; height: 20px; background: var(--border); }

#examples {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  font-size: 12px;
  padding: 4px 8px;
  border-radius: 5px;
  cursor: pointer;
  outline: none;
  max-width: 180px;
}
#examples:focus { border-color: var(--accent); }

.spacer { flex: 1; }

#status { font-size: 12px; color: var(--dim); }

#run-btn {
  display: flex;
  align-items: center;
  gap: 6px;
  background: var(--accent);
  color: #fff;
  border: 1px solid transparent;
  border-radius: 6px;
  padding: 6px 14px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: opacity 0.15s, background 0.15s, border-color 0.15s, color 0.15s;
  flex-shrink: 0;
}
#run-btn:hover   { opacity: 0.85; }
#run-btn:disabled{ opacity: 0.4; cursor: default; }
#run-btn.running {
  background: transparent;
  border-color: var(--red);
  color: var(--red);
}
#run-btn.running:hover { opacity: 1; background: rgba(248,113,113,0.12); }

#stop-btn {
  display: flex;
  align-items: center;
  gap: 6px;
  background: transparent;
  border: 1px solid var(--red);
  color: var(--red);
  border-radius: 6px;
  padding: 6px 14px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: opacity 0.15s, background 0.15s;
  flex-shrink: 0;
}
#stop-btn:disabled { opacity: 0.3; cursor: default; }
#stop-btn:not(:disabled):hover { background: rgba(248,113,113,0.12); }

#run-btn kbd {
  font-size: 10px;
  background: rgba(255,255,255,0.15);
  border-radius: 3px;
  padding: 1px 4px;
  font-family: var(--mono);
  font-weight: 400;
}

/* ── layout ──────────────────────────────────────────────────────────────── */
#layout {
  display: flex;
  height: calc(100vh - 44px);
}

#editor-pane {
  flex: 1 1 50%;
  min-width: 0;
  min-height: 0;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  border-right: 1px solid var(--border);
}

#editor-wrap {
  flex: 1;
  min-height: 0;
  overflow: hidden;
  position: relative;
}

/* Make CM fill the pane */
#editor-wrap .cm-editor { height: 100%; border-radius: 0; border: none; }
#editor-wrap .cm-scroller { height: 100%; overflow: auto; }

#output-pane {
  flex: 1 1 50%;
  min-width: 0;
  display: flex;
  flex-direction: column;
  background: var(--bg);
  overflow: auto;
}



#output {
  flex: 1;
  padding: 16px 18px;
  font-family: var(--mono);
  font-size: 13px;
  line-height: 1.65;
  white-space: pre-wrap;
  word-break: break-all;
  overflow-y: auto;
  color: var(--dim);
  font-style: italic;
}
#output.ok  { color: var(--green); font-style: normal; }
#output.err { color: var(--red);   font-style: normal; }

canvas#canvas {
  display: none;
  margin: auto;
}

/* ── divider (drag to resize) ─────────────────────────────────────────────── */
#divider {
  width: 5px;
  cursor: col-resize;
  background: var(--border);
  flex-shrink: 0;
  transition: background 0.15s;
}
#divider:hover, #divider.dragging { background: var(--accent); }

/* ── bascule barre latérale ───────────────────────────────────────────────── */
#rail-toggle {
  display: flex; align-items: center; justify-content: center;
  background: transparent; border: 1px solid var(--border); color: var(--dim);
  border-radius: 6px; padding: 6px 8px; cursor: pointer;
  transition: background 0.15s, border-color 0.15s, color 0.15s;
}
#rail-toggle:hover { border-color: var(--accent); color: var(--accent); }
#rail-toggle.active { color: var(--accent); border-color: var(--accent); }

/* ── menu Projet (drill-down) ─────────────────────────────────────────────── */
#project-wrap { position: relative; }
#project-btn {
  display: flex; align-items: center; gap: 6px;
  background: var(--surface2); border: 1px solid var(--border); color: var(--text);
  border-radius: 6px; padding: 6px 10px; font-size: 12px; font-weight: 500; cursor: pointer;
  transition: background 0.15s, border-color 0.15s;
}
#project-btn { position: relative; }
#project-btn:hover:not(:disabled) { border-color: var(--accent); }
#project-btn:disabled { opacity: 0.5; cursor: default; }
/* pastille « version plus récente sur GitHub » (persistante, visible mobile+PC) */
#project-btn.sync-update::after {
  content: ''; position: absolute; top: -3px; right: -3px;
  width: 9px; height: 9px; border-radius: 50%;
  background: var(--yellow); border: 2px solid var(--surface);
}
#project-label { max-width: 160px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

#project-menu {
  display: none; position: absolute; top: calc(100% + 6px); left: 0; z-index: 60;
  min-width: 240px; max-width: 320px; max-height: 70vh; overflow-y: auto;
  background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
  box-shadow: 0 8px 28px rgba(0,0,0,0.45); padding: 5px;
}
.menu-header {
  display: flex; align-items: center; gap: 6px; padding: 6px 8px 8px;
  font-size: 11px; font-weight: 600; color: var(--dim); text-transform: uppercase; letter-spacing: 0.4px;
}
.menu-back {
  background: transparent; border: none; color: var(--accent); font-size: 18px; line-height: 1;
  cursor: pointer; padding: 0 4px; border-radius: 4px;
}
.menu-back:hover { background: var(--surface2); }
.menu-item {
  display: flex; align-items: center; justify-content: space-between; gap: 8px; width: 100%;
  background: transparent; border: none; color: var(--text); text-align: left;
  padding: 9px 10px; font-size: 13px; border-radius: 6px; cursor: pointer;
}
.menu-item:hover { background: var(--surface2); }
.menu-arrow { color: var(--dim); font-size: 16px; }
.menu-sep { height: 1px; background: var(--border); margin: 5px 4px; }
.menu-empty { padding: 10px; font-size: 12px; color: var(--dim); font-style: italic; }
.menu-form { padding: 6px 10px 10px; display: flex; flex-direction: column; gap: 8px; }
.menu-info { font-size: 11.5px; color: var(--dim); line-height: 1.5; }
.menu-info a { color: var(--accent); text-decoration: none; }
.menu-info code { font-family: var(--mono); color: var(--text); font-size: 11px; }
.menu-input {
  background: var(--bg); border: 1px solid var(--border); color: var(--text);
  border-radius: 6px; padding: 7px 9px; font-size: 12px; font-family: var(--mono); outline: none;
}
.menu-input:focus { border-color: var(--accent); }
.menu-btn {
  background: var(--accent); color: #fff; border: none; border-radius: 6px;
  padding: 7px 10px; font-size: 12.5px; font-weight: 600; cursor: pointer;
}
.menu-btn:disabled { opacity: 0.6; cursor: default; }
.menu-err { font-size: 11.5px; color: var(--red); }

/* ── liste latérale de fichiers ───────────────────────────────────────────── */
#editor-main { flex: 1; min-height: 0; display: flex; }
#editor-wrap { flex: 1; min-width: 0; }
#file-rail {
  width: 172px; flex-shrink: 0; display: flex; flex-direction: column;
  background: var(--surface); border-right: 1px solid var(--border); overflow: hidden;
}
.rail-head {
  display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
  padding: 8px 10px; font-size: 11px; font-weight: 600; color: var(--dim);
  text-transform: uppercase; letter-spacing: 0.4px; border-bottom: 1px solid var(--border);
}
.rail-head-res { border-top: 1px solid var(--border); }
.rail-head button {
  background: transparent; border: none; color: var(--accent); font-size: 16px; line-height: 1;
  cursor: pointer; padding: 0 4px; border-radius: 4px;
}
.rail-head button:hover { background: var(--surface2); }
#file-list { flex: 1 1 auto; overflow-y: auto; padding: 4px; }
#res-list  { flex: 0 1 40%; overflow-y: auto; padding: 4px; }
.rail-empty { padding: 6px 8px; font-size: 12px; color: var(--dim); font-style: italic; }
.file-item {
  display: flex; align-items: center; justify-content: space-between; gap: 4px;
  padding: 6px 8px; border-radius: 5px; cursor: pointer; font-size: 12.5px;
  font-family: var(--mono); color: var(--text); white-space: nowrap; overflow: hidden;
}
.file-item:hover { background: var(--surface2); }
.file-item.active { background: var(--surface2); box-shadow: inset 2px 0 0 var(--accent); }
.file-name { overflow: hidden; text-overflow: ellipsis; }
.file-item.entry .file-name { color: var(--accent); }
.file-acts { display: none; flex-shrink: 0; }
.file-item:hover .file-acts, .file-item.active .file-acts { display: inline-flex; gap: 1px; }
.file-act {
  background: transparent; border: none; color: var(--dim); cursor: pointer;
  font-size: 11px; padding: 1px 3px; border-radius: 3px;
}
.file-act:hover { background: var(--border); color: var(--text); }

/* ── mobile ──────────────────────────────────────────────────────────────── */
@media (max-width: 640px) {
  #layout { flex-direction: column; }
  #file-rail { width: 116px; }
  #project-label { max-width: 84px; }
  #project-menu { min-width: 220px; max-width: 82vw; }
  .file-acts { display: inline-flex; gap: 1px; }   /* tactile : actions toujours visibles */
  #editor-pane { flex: 1 1 55%; border-right: none; border-bottom: 1px solid var(--border); }
  #output-pane { flex: 1 1 45%; min-height: 0; overflow: hidden; }
  #divider { width: 100%; height: 6px; cursor: row-resize; }

  /* Police réduite — maximum-scale=1.0 dans le viewport empêche le zoom iOS */
  #editor-wrap .cm-editor  { font-size: 12px; }
  #editor-wrap .cm-content { font-size: 12px; }
  /* Scroll horizontal fluide sur iOS */
  #editor-wrap .cm-scroller { overflow-x: auto; -webkit-overflow-scrolling: touch; }

  /* toolbar compact : icônes seules, TOUJOURS sur une seule ligne. */
  #toolbar { gap: 6px; padding: 0 8px; flex-wrap: nowrap; }
  .btn-label { display: none; }
  #run-btn kbd { display: none; }
  #status { display: none; }
  #project-btn, #reload-btn, #standalone-btn, #img-btn,
  #run-btn, #stop-btn, #copy-btn { padding: 6px 8px !important; }
}
</style>
</head>
<body>

<div id="toolbar">
  <a href="index.html" class="logo">Ollin</a>
  <button id="rail-toggle" title="Afficher / masquer les fichiers">
    <svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1.5" y="2.5" width="13" height="11" rx="1.5"/><line x1="6" y1="2.5" x2="6" y2="13.5"/></svg>
  </button>
  <div id="project-wrap">
    <button id="project-btn" title="Projets" disabled aria-haspopup="true" aria-expanded="false">
      <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M1.5 4.5A1 1 0 012.5 3.5H6l1.5 1.5H13.5a1 1 0 011 1v6a1 1 0 01-1 1h-11a1 1 0 01-1-1z"/></svg>
      <span id="project-label" class="btn-label">Projet</span>
      <svg width="9" height="9" viewBox="0 0 16 16" fill="currentColor"><path d="M3 6l5 5 5-5z"/></svg>
    </button>
    <div id="project-menu" role="menu"></div>
  </div>
  <div class="spacer"></div>
  <span id="status">Chargement…</span>
  <button id="reload-btn" title="Recharger en vidant le cache (récupère le dernier WASM ; le code est conservé)" style="display:flex;align-items:center;gap:5px;background:transparent;border:1px solid var(--border);color:var(--dim);border-radius:6px;padding:6px 12px;font-size:12px;font-weight:500;cursor:pointer;transition:background 0.15s,border-color 0.15s,color 0.15s">
    <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M13.6 8a5.6 5.6 0 1 1-1.6-3.9"/><path d="M13.5 2v3h-3"/></svg>
    <span class="btn-label">Recharger</span>
  </button>
  <input type="file" id="img-file-input" accept="image/png,image/jpeg,image/gif,image/webp,image/bmp" multiple style="display:none">
  <label for="img-file-input" id="img-btn" title="Charger des images (PNG, JPG…) pour image.load()" style="display:flex;align-items:center;gap:5px;background:transparent;border:1px solid var(--border);color:var(--dim);border-radius:6px;padding:6px 12px;font-size:12px;font-weight:500;cursor:pointer;transition:background 0.15s,border-color 0.15s,color 0.15s;user-select:none">
    <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="1" y="3" width="14" height="10" rx="1.5"/><path d="M1 10l4-3 3 2.5 3-3.5 4 4"/><circle cx="11.5" cy="6.5" r="1.2" fill="currentColor" stroke="none"/></svg>
    <span class="btn-label" id="img-btn-label">Images</span>
  </label>
  <button id="standalone-btn" title="Exécuter en plein écran dans une page dédiée" style="display:flex;align-items:center;gap:5px;background:transparent;border:1px solid var(--border);color:var(--dim);border-radius:6px;padding:6px 12px;font-size:12px;font-weight:500;cursor:pointer;transition:background 0.15s,border-color 0.15s,color 0.15s">
    <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M6 2H2v4M10 2h4v4M6 14H2v-4M10 14h4v-4"/></svg>
    <span class="btn-label">Autonome</span>
  </button>
  <button id="copy-btn" title="Copier le code" style="display:flex;align-items:center;gap:5px;background:transparent;border:1px solid var(--accent);color:var(--accent);border-radius:6px;padding:6px 12px;font-size:12px;font-weight:500;cursor:pointer;transition:background 0.15s,opacity 0.15s" onmouseover="this.style.background='rgba(124,131,255,0.12)'" onmouseout="this.style.background='transparent'">
    <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="5.5" y="5.5" width="9" height="9" rx="1.5"/><path d="M10.5 5.5V3a1 1 0 00-1-1H3a1 1 0 00-1 1h2.5"/></svg>
    <span class="btn-label">Copier</span>
  </button>
  <button id="run-btn" disabled>
    <svg width="10" height="10" viewBox="0 0 16 16" fill="currentColor"><path d="M3 2l11 6-11 6V2z"/></svg>
    <span class="btn-label">Exécuter</span><kbd>Ctrl+↵</kbd>
  </button>
  <button id="stop-btn" disabled title="Pause / Reprendre" style="display:none">
    <svg width="10" height="10" viewBox="0 0 16 16" fill="currentColor"><rect x="2" y="2" width="4" height="12" rx="1"/><rect x="10" y="2" width="4" height="12" rx="1"/></svg>
    <span class="btn-label">Pause</span>
  </button>
</div>

<div id="layout">
  <div id="editor-pane">
    <div id="editor-main">
      <aside id="file-rail">
        <div class="rail-head">
          <span>Fichiers</span>
          <button id="new-file-btn" title="Nouveau fichier">＋</button>
        </div>
        <div id="file-list"></div>
        <div class="rail-head rail-head-res">
          <span>Ressources</span>
          <button id="new-res-btn" title="Ajouter une image">＋</button>
        </div>
        <div id="res-list"></div>
      </aside>
      <div id="editor-wrap"></div>
    </div>
  </div>
  <div id="divider" style="display:none"></div>
  <div id="output-pane" style="display:none">
    <div id="output">Prêt.</div>
    <canvas id="canvas"></canvas>
  </div>
</div>

<div id="load-error" style="display:none;position:fixed;inset:0;z-index:200;background:rgba(15,17,23,0.92);flex-direction:column;align-items:center;justify-content:center;gap:14px;text-align:center;padding:24px;font-family:system-ui,sans-serif">
  <div style="font-size:15px;color:#f87171;font-weight:600">Le chargement de l'éditeur a échoué</div>
  <div style="font-size:13px;color:#8a93b0;max-width:380px;line-height:1.5">Souvent dû à un réseau lent ou au CDN (CodeMirror) momentanément indisponible. Réessaie en vidant le cache.</div>
  <button id="load-error-reload" style="background:#7c83ff;color:#fff;border:none;border-radius:7px;padding:9px 20px;font-size:14px;font-weight:600;cursor:pointer">Recharger</button>
</div>

<!-- Watchdog : script CLASSIQUE (s'exécute même si le module ES échoue à se
     charger). Surveille l'init de l'éditeur et propose une relance claire au
     lieu de laisser l'UI figée sur « Chargement ». -->
<script>
(function () {
  var el = document.getElementById('load-error');
  var shown = false;
  function showLoadError() {
    if (shown || window.__ollinReady) return;
    shown = true;
    el.style.display = 'flex';
  }
  document.getElementById('load-error-reload').addEventListener('click', function () {
    var reload = function () { location.reload(); };
    if ('caches' in window) {
      caches.keys().then(function (ks) { return Promise.all(ks.map(function (k) { return caches.delete(k); })); }).then(reload).catch(reload);
    } else {
      reload();
    }
  });
  // Échec de chargement d'une ressource (module/CDN/WASM)
  window.addEventListener('error', function (e) {
    if (e && e.target && e.target.tagName === 'SCRIPT') showLoadError();
  }, true);
  window.addEventListener('unhandledrejection', function () {
    // un import ES qui échoue rejette ; on laisse une chance puis on vérifie
    setTimeout(function () { if (!window.__ollinReady) showLoadError(); }, 1500);
  });
  // Filet de sécurité : si l'éditeur n'est pas monté après 8 s, c'est bloqué
  setTimeout(function () {
    if (!window.__ollinReady && !document.querySelector('#editor-wrap .cm-editor')) showLoadError();
  }, 8000);
})();
</script>

<script type="module">
// CodeMirror servi en local (bundle esbuild) — plus aucune dépendance CDN.
// Régénéré par .github/workflows/build-playground.yml (tools/cm-entry.js).
import {
  EditorState,
  EditorView, lineNumbers, keymap, drawSelection, highlightActiveLine, highlightActiveLineGutter,
  defaultKeymap, historyKeymap, history, indentWithTab,
  StreamLanguage, syntaxHighlighting, HighlightStyle, indentUnit, codeFolding, foldGutter, foldKeymap, foldService,
  tags,
  autocompletion, completionKeymap, acceptCompletion,
} from './vendor/codemirror.js'
import { CODE_DISPLAY } from './cm-shared.js'
// Modules projet importés dynamiquement AVEC cache-buster : une mise à jour est
// prise en compte dès le prochain chargement (pas de version figée en cache HTTP).
const Store = await import('./pg-store.js?v=' + Date.now())
const GH    = await import('./pg-github.js?v=' + Date.now())

// ── Ollin syntax ──────────────────────────────────────────────────────────
const KEYWORDS = new Set([
  'var','global','const','while','do','for','in','if','then','elseif','end',
  'break','true','false','nil','try','catch','throw','else','func','return',
  'import','as','or','and','not','class','extends','super','self',
  'switch','case','default'
])
const BUILTINS = new Set(['print','printf','time','assert','len','typeof','Color','math','graphics','string','colors','window','image','keyboard','mouse'])

const ollinLang = StreamLanguage.define({
  name: 'ollin',
  startState: () => ({ block: false }),
  token(stream, state) {
    if (state.block) {
      if (stream.match('###')) { state.block = false; return 'comment' }
      stream.next(); return 'comment'
    }
    if (stream.match('###')) { state.block = true; return 'comment' }
    if (stream.eatSpace()) return null
    if (stream.match('##')) { stream.skipToEnd(); return 'comment' }
    if (stream.peek() === '"') {
      stream.next()
      while (!stream.eol()) { const ch = stream.next(); if (ch === '"') break; if (ch === '\\') stream.next() }
      return 'string'
    }
    if (stream.match(/^0[xX][\da-fA-F](?:_?[\da-fA-F])*/)) return 'number'
    if (stream.match(/^0[oO][0-7](?:_?[0-7])*/)) return 'number'
    if (stream.match(/^0[bB][01](?:_?[01])*/)) return 'number'
    if (stream.match(/^\.\d[\d_]*/)) return 'number'
    if (stream.match(/^\d[\d_]*(?:\.[\d_]+)?/)) return 'number'
    if (stream.match(/^[a-zA-Z_]\w*/)) {
      const w = stream.current()
      if (KEYWORDS.has(w)) return 'keyword'
      if (BUILTINS.has(w)) return 'atom'
      return null
    }
    if (stream.match(/^(\/\/|\+=|-=|\*=|\/=|%=|==|>=|<=|<>|<<|>>|\.\.\.|\.\.)/) ||
        stream.match(/^[+\-*/%><&|^~?\[\]{}:.]/)) return 'operator'
    stream.next(); return null
  }
})

// Hooks de cycle de vie appelés par le moteur : insérés en squelette complet
// (ou juste le nom si on est déjà après « func »). Évite les fautes de frappe.
function lifecycle(name, params, detail) {
  return {
    label: name, type: 'function', detail,
    apply: (view, c, from, to) => {
      const line = view.state.doc.lineAt(from)
      const before = view.state.doc.sliceString(line.from, from)
      if (/\bfunc\s+\S*$/.test(before)) {
        const ins = `${name}(${params})`
        view.dispatch({ changes: { from, to, insert: ins }, selection: { anchor: from + ins.length } })
      } else {
        const head = `func ${name}(${params})\n    `
        view.dispatch({ changes: { from, to, insert: head + '\nend' }, selection: { anchor: from + head.length } })
      }
    },
  }
}

function ollinComplete(context) {
  const dotWord = context.matchBefore(/[a-zA-Z_]\w*\.\w*/)
  if (dotWord) {
    const dot    = dotWord.text.indexOf('.')
    const prefix = dotWord.text.slice(0, dot)
    const members = MODULE_MEMBERS[prefix]
    if (members) {
      return {
        from: dotWord.from + dot + 1,
        options: members.map(m => ({ ...m, label: m.label.slice(prefix.length + 1) })),
        validFor: /^\w*$/,
      }
    }
    return null
  }
  const word = context.matchBefore(/\w+/)
  if (!word || (word.from === word.to && !context.explicit)) return null
  const moduleNames = Object.keys(MODULE_MEMBERS).map(m => ({ label: m, type: 'namespace' }))
  return {
    from: word.from,
    options: [...AC_LIFECYCLE, ...AC_KEYWORDS, ...AC_BUILTINS, ...moduleNames],
    validFor: /^\w*$/,
  }
}

// ── Repliement de blocs (fold) ──────────────────────────────────────────────
// Ollin est une StreamLanguage (pas d'arbre Lezer) → on fournit les bornes de
// bloc via le facet standard `foldService`. Un bloc s'ouvre sur func/if/while/
// for/class/try/switch et se ferme sur `end` ; on suit la profondeur.
const FOLD_OPENERS = /\b(?:func|if|while|for|class|try|switch)\b/g
const FOLD_ENDS    = /\bend\b/g
const countMatches = (s, re) => (s.match(re) || []).length

function ollinFoldRange(state, lineStart) {
  const first = state.doc.lineAt(lineStart)
  const head = first.text.replace(/##.*$/, '')          // ignorer les commentaires
  let depth = countMatches(head, FOLD_OPENERS) - countMatches(head, FOLD_ENDS)
  if (depth <= 0)
    return null                                          // pas un ouvrant net (ou refermé sur la ligne)
  for (let n = first.number + 1; n <= state.doc.lines; n++) {
    const line = state.doc.line(n)
    const body = line.text.replace(/##.*$/, '')
    depth += countMatches(body, FOLD_OPENERS) - countMatches(body, FOLD_ENDS)
    if (depth <= 0) {
      const from = first.to                              // fin de la ligne d'ouverture
      const to = state.doc.line(n - 1).to                // fin de la dernière ligne avant `end`
      return to > from ? { from, to } : null
    }
  }
  return null
}

const projectBtn   = document.getElementById('project-btn')

const fileKey = id => 'ollin-pg-file:' + id           // dernier fichier ouvert / projet
const scripts = p => Object.keys(p.files).filter(f => f !== Store.MANIFEST).sort()

function setEditorText(text) {
  loadingFile = true
  view.dispatch({ changes: { from: 0, to: view.state.doc.length, insert: text } })
  loadingFile = false
}

function flushEditorToFile() {
  if (currentProject && currentFile)
    currentProject.files[currentFile] = view.state.doc.toString()
}

function scheduleSave() {
  if (!currentProject) return
  flushEditorToFile()
  Store.saveProject(currentProject).catch(e => console.error('saveProject', e))
}

// ── liste latérale de fichiers ──
function renderFiles() {
  fileRail.innerHTML = ''
  if (!currentProject) return
  for (const path of scripts(currentProject)) {
    const isEntry = path === currentProject.entry
    const row = document.createElement('div')
    row.className = 'file-item' + (path === currentFile ? ' active' : '')
    row.title = path
    const label = document.createElement('span')
    label.className = 'file-name'
    label.textContent = path
    if (isEntry) row.classList.add('entry')
    row.appendChild(label)

    const acts = document.createElement('span')
    acts.className = 'file-acts'
    acts.appendChild(iconBtn(isEntry ? '★' : '☆', isEntry ? 'Point d\'entrée' : 'Définir comme point d\'entrée',
      e => { e.stopPropagation(); setEntry(path) }))
    acts.appendChild(iconBtn('✎', 'Renommer', e => { e.stopPropagation(); renameFile(path) }))
    acts.appendChild(iconBtn('🗑', 'Supprimer', e => { e.stopPropagation(); deleteFile(path) }))
    row.appendChild(acts)

    row.addEventListener('click', () => openFile(path))
    fileRail.appendChild(row)
  }
}

function iconBtn(txt, title, on) {
  const b = document.createElement('button')
  b.className = 'file-act'
  b.textContent = txt
  b.title = title
  b.addEventListener('click', on)
  return b
}

function openFile(path) {
  if (path === currentFile) return
  flushEditorToFile()
  currentFile = path
  setEditorText(currentProject.files[path] ?? '')
  localStorage.setItem(fileKey(currentProject.id), path)
  renderFiles()
  view.focus()
}

async function newFile() {
  let name = prompt('Nom du nouveau fichier (.ol) :', 'nouveau.ol')
  if (!name) return
  name = name.trim()
  if (!/\.ol$/.test(name)) name += '.ol'
  if (currentProject.files[name] !== undefined) { alert('Ce fichier existe déjà.'); return }
  flushEditorToFile()
  currentProject.files[name] = ''
  await Store.saveProject(currentProject)
  openFile(name)
}

async function renameFile(path) {
  let name = prompt('Renommer le fichier :', path)
  if (!name || name.trim() === path) return
  name = name.trim()
  if (!/\.ol$/.test(name)) name += '.ol'
  if (currentProject.files[name] !== undefined) { alert('Ce nom est déjà pris.'); return }
  flushEditorToFile()
  currentProject.files[name] = currentProject.files[path]
  delete currentProject.files[path]
  if (currentProject.entry === path) currentProject.entry = name
  if (currentFile === path) currentFile = name
  await Store.saveProject(currentProject)
  localStorage.setItem(fileKey(currentProject.id), currentFile)
  setEditorText(currentProject.files[currentFile] ?? '')
  renderFiles()
}

async function deleteFile(path) {
  if (scripts(currentProject).length <= 1) { alert('Un projet doit garder au moins un fichier.'); return }
  if (!confirm(`Supprimer « ${path} » ?`)) return
  delete currentProject.files[path]
  if (currentProject.entry === path) currentProject.entry = scripts(currentProject)[0]
  if (currentFile === path) currentFile = currentProject.entry
  await Store.saveProject(currentProject)
  setEditorText(currentProject.files[currentFile] ?? '')
  renderFiles()
}

async function setEntry(path) {
  currentProject.entry = path
  await Store.saveProject(currentProject)
  renderFiles()
}

// ── ressources (images) ──
function renderResources() {
  resList.innerHTML = ''
  if (!currentProject) return
  const names = Object.keys(currentProject.resources || {}).sort()
  if (!names.length) {
    const d = document.createElement('div'); d.className = 'rail-empty'; d.textContent = '(aucune)'

  for (const name of names) {

    const label = document.createElement('span'); label.className = 'file-name'; label.textContent = name
    row.appendChild(label)
    const acts = document.createElement('span'); acts.className = 'file-acts'
    acts.appendChild(iconBtn('✎', 'Renommer', e => { e.stopPropagation(); renameResource(name) }))
    acts.appendChild(iconBtn('🗑', 'Supprimer', e => { e.stopPropagation(); deleteResource(name) }))
    row.appendChild(acts)
    resList.appendChild(row)
  }
}

async function renameResource(name) {
  let n = prompt('Renommer la ressource :', name)
  if (!n || n.trim() === name) return
  n = n.trim()
  if (currentProject.resources[n] !== undefined) { alert('Ce nom est déjà pris.'); return }
  currentProject.resources[n] = currentProject.resources[name]
  delete currentProject.resources[name]
  await Store.saveProject(currentProject)
  if (ollin && ollin.preloadImage) {
    const r = currentProject.resources[n]
    ollin.preloadImage(n, r.b64, r.ext)
  }
  renderResources(); updateImgBtn()
}

async function deleteResource(name) {
  if (!confirm(`Supprimer la ressource « ${name} » ?`)) return
  delete currentProject.resources[name]
  await Store.saveProject(currentProject)
  renderResources(); updateImgBtn()
}

// Pousse tout le projet (scripts + ressources) dans le runtime WASM avant un Run.
function loadProjectIntoRuntime() {
  if (!ollin || !currentProject) return
  if (ollin.resetSources) ollin.resetSources()
  for (const [path, content] of Object.entries(currentProject.files)) {
    if (path === Store.MANIFEST) continue
    if (ollin.preloadSource) ollin.preloadSource(path, content)
  }
  for (const [name, r] of Object.entries(currentProject.resources || {})) {
    if (ollin.preloadImage) ollin.preloadImage(name, r.b64, r.ext)
  }
}

// ── chargement / bascule de projet ──
async function loadProject(id) {
  const p = await Store.getProject(id)
  if (!p) return
  flushEditorToFile()
  currentProject = p
  Store.setActiveId(id)
  const files = scripts(p)
  const last = localStorage.getItem(fileKey(id))
  currentFile = (last && p.files[last] !== undefined) ? last
              : (p.files[p.entry] !== undefined ? p.entry : files[0])
  setEditorText(p.files[currentFile] ?? '')
  projectLabel.textContent = p.name
  renderFiles()
  renderResources()
  updateImgBtn()
  view.focus()
  checkRemoteFreshness(p)   // garde-fou d'ouverture (non bloquant)
}

async function switchProject(id) {
  flushEditorToFile()                        // récupérer les dernières frappes
  await Store.saveProject(currentProject)    // puis persister avant de quitter
  await loadProject(id)
}

    closeMenu(); await loadProject(p.id)
  }))
  projectMenu.appendChild(menuItem('⧉ Dupliquer', false, async () => {
    flushEditorToFile(); await Store.saveProject(currentProject)
    const copy = await Store.createProject(currentProject.name + ' (copie)')
    copy.files = { ...currentProject.files }; copy.entry = currentProject.entry
    delete copy.files[Store.MANIFEST]
    await Store.saveProject(copy)
    closeMenu(); await switchProject(copy.id)
  }))
  projectMenu.appendChild(menuItem('🗑 Supprimer', false, async () => {
    if (!confirm(`Supprimer le projet « ${currentProject.name} » ?`)) return
    const gone = currentProject.id
    await Store.deleteProject(gone)
    const list = await Store.listProjects()
    closeMenu()
    if (list.length) await loadProject(list[0].id)
    else { const p = await Store.createProject('Sans titre'); await loadProject(p.id) }
  }))

  // ── section GitHub ──
  projectMenu.appendChild(menuSep())
  if (GH.isConnected()) {
    const hdr = document.createElement('div')
    hdr.className = 'menu-header'
    hdr.textContent = 'GitHub' + (ghLogin ? ' : @' + ghLogin : '')
    projectMenu.appendChild(hdr)
    if (!ghLogin) {
      GH.getUser().then(u => { ghLogin = u.login; hdr.textContent = 'GitHub : @' + u.login }).catch(() => {})
    }
    projectMenu.appendChild(menuItem('🗄 Dépôt : ' + GH.getRepo(), false, () => {
      const v = prompt('Dépôt cible (nom, ou « owner/repo » pour un dépôt partagé) :', GH.getRepo())
      if (v === null) return
      GH.setRepo(v)
      renderMenuRoot()
    }))
    projectMenu.appendChild(menuItem('⬆ Pousser vers GitHub', false, () => ghPush()))
    projectMenu.appendChild(menuItem('⬇ Récupérer (Pull)', false, ghPull))
    projectMenu.appendChild(menuItem('📥 Ouvrir depuis GitHub', true, renderMenuRemote))
    projectMenu.appendChild(menuItem('⏻ Déconnexion', false, () => { GH.clearToken(); ghLogin = null; renderMenuRoot() }))
  } else {
    projectMenu.appendChild(menuItem('🔗 Se connecter à GitHub', true, renderMenuConnect))
  }
}

async function renderMenuOpen() {
  const list = await Store.listProjects()
  projectMenu.innerHTML = ''
  projectMenu.appendChild(menuHeader('Ouvrir un projet', renderMenuRoot))
  for (const p of list) {
    const check = p.id === currentProject.id ? '✓ ' : ''
    projectMenu.appendChild(menuItem(check + p.name, false, async () => {
      closeMenu(); if (p.id !== currentProject.id) await switchProject(p.id)
    }))
  }
}

function renderMenuExamples() {
  projectMenu.innerHTML = ''
  projectMenu.appendChild(menuHeader('Nouveau depuis un exemple', renderMenuRoot))
  if (!examples.length) {
    const d = document.createElement('div'); d.className = 'menu-empty'; d.textContent = 'Aucun exemple.'
    projectMenu.appendChild(d); return

// ── GitHub : état + parcours ──────────────────────────────────────────────
let ghLogin = null
let statusTimer = null
function setStatus(msg, transient, isError) {
  const el = document.getElementById('status')
  if (!el) return
  el.textContent = msg
  el.style.color = isError ? 'var(--red)' : ''
  clearTimeout(statusTimer)
  if (transient) statusTimer = setTimeout(() => { el.textContent = ''; el.style.color = '' }, 4000)
}

function renderMenuConnect() {
  projectMenu.innerHTML = ''
  projectMenu.appendChild(menuHeader('Se connecter à GitHub', renderMenuRoot))
  const wrap = document.createElement('div'); wrap.className = 'menu-form'
  const info = document.createElement('div'); info.className = 'menu-info'
  info.innerHTML = 'Colle un <b>fine-grained token</b> (dépôt <code>ollin-projects</code>, permission Contents : lecture/écriture). '
    + '<a href="https://github.com/settings/personal-access-tokens/new" target="_blank" rel="noopener">Créer un token ↗</a>'
  const input = document.createElement('input')
  input.type = 'password'; input.className = 'menu-input'; input.placeholder = 'github_pat_… / ghp_…'
  const repo = document.createElement('input')
  repo.type = 'text'; repo.className = 'menu-input'; repo.value = GH.getRepo()
  repo.placeholder = 'dépôt : ollin-projects ou owner/repo'
  repo.title = 'Dépôt cible (défaut ollin-projects). « owner/repo » pour un dépôt partagé.'
  const btn = document.createElement('button'); btn.className = 'menu-btn'; btn.textContent = 'Connecter'
  const err = document.createElement('div'); err.className = 'menu-err'
  const connect = async () => {
    const t = input.value.trim(); if (!t) return
    GH.setToken(t); GH.setRepo(repo.value); btn.disabled = true; btn.textContent = 'Vérification…'; err.textContent = ''
    try { const u = await GH.getUser(); ghLogin = u.login; renderMenuRoot() }
    catch (e) { GH.clearToken(); err.textContent = 'Token invalide : ' + e.message; btn.disabled = false; btn.textContent = 'Connecter' }
  }
  btn.addEventListener('click', connect)
  input.addEventListener('keydown', e => { if (e.key === 'Enter') connect() })
  repo.addEventListener('keydown', e => { if (e.key === 'Enter') connect() })
  wrap.append(info, input, repo, btn, err)
  projectMenu.appendChild(wrap)
  input.focus()
}

async function ghPush(force) {
  closeMenu()
  if (!currentProject) return
  flushEditorToFile(); await Store.saveProject(currentProject)
  setStatus('Envoi vers GitHub…')
  try {
    await GH.ensureRepo()
    await GH.pushProject(currentProject, null, { force })
    await Store.saveProject(currentProject)   // persister project.remote (dont treeSha)
    projectBtn.classList.remove('sync-update')   // on est à jour
    setStatus('Poussé sur GitHub ✓', true)
  } catch (e) {
    if (e.code === 'CONFLICT') {
      if (confirm('Le dépôt distant a été modifié depuis ta dernière synchro (sans doute depuis un autre poste).\n\nÉcraser avec ta version locale ?\nOK = écraser · Annuler = ne rien faire (fais « Récupérer / Pull » d\'abord).')) {
        return ghPush(true)
      }
      setStatus('Push annulé — fais « Récupérer (Pull) » d\'abord', true)
      return
    }
    setStatus('Erreur : ' + e.message, true, true)
  }
}

// Cœur du Pull (sans confirmation) — réutilisé par ghPull et le garde-fou d'ouverture.
async function doPull() {
  if (!currentProject) return
  const slug = (currentProject.remote && currentProject.remote.slug) || currentProject.id
  setStatus('Récupération…')
  try {
    const p = await GH.pullProject(slug)
    p.id = currentProject.id
    await Store.saveProject(p)
    await loadProject(p.id)
    setStatus('Projet à jour ✓', true)
  } catch (e) { setStatus('Erreur : ' + e.message, true, true) }
}

async function ghPull() {
  closeMenu()
  if (!currentProject) return
  const slug = (currentProject.remote && currentProject.remote.slug) || currentProject.id
  if (!confirm(`Récupérer « ${slug} » depuis GitHub et remplacer la version locale ?`)) return
  await doPull()
}

// Garde-fou d'ouverture : à l'ouverture d'un projet lié à GitHub (connecté),
// vérifie en arrière-plan si une version plus récente existe et propose un Pull.
// PASSIF : aucune boîte de dialogue, aucun Pull automatique. On se contente
// d'un message discret ; l'utilisateur garde le contrôle (Pull manuel au besoin).
async function checkRemoteFreshness(project) {
  if (!project.remote || !project.remote.slug || !GH.isConnected()) return
  try {
    const cur = await GH.remoteTreeSha(project.remote.slug)
    if (!currentProject || currentProject.id !== project.id) return   // projet changé entre-temps
    const newer = cur !== null && cur !== project.remote.treeSha
    projectBtn.classList.toggle('sync-update', newer)   // pastille persistante
    if (newer) setStatus('⬇ Version plus récente sur GitHub — « Récupérer (Pull) » pour l\'obtenir')
  } catch (_) { /* hors-ligne / token invalide : silencieux */ }
}

async function renderMenuRemote() {
  projectMenu.innerHTML = ''
  projectMenu.appendChild(menuHeader('Ouvrir depuis GitHub', renderMenuRoot))
  const loading = document.createElement('div'); loading.className = 'menu-empty'; loading.textContent = 'Chargement…'
  projectMenu.appendChild(loading)
  let list
  try { list = await GH.listRemoteProjects() }
  catch (e) { loading.textContent = 'Erreur : ' + e.message; return }
  loading.remove()
  if (!list.length) {
    const d = document.createElement('div'); d.className = 'menu-empty'; d.textContent = 'Aucun projet distant.'
    projectMenu.appendChild(d); return
  }
  for (const r of list) {
    projectMenu.appendChild(menuItem('📦 ' + r.name, false, async () => {
      closeMenu()
      const existing = await Store.getProject(r.slug)
      if (existing && !confirm(`Un projet « ${r.slug} » existe déjà en local. L'écraser avec la version GitHub ?`)) return
      flushEditorToFile()
      if (currentProject && currentProject.id !== r.slug) await Store.saveProject(currentProject)
      setStatus('Récupération…')
      try {
        const p = await GH.pullProject(r.slug)
        await Store.saveProject(p)
        await loadProject(p.id)
        setStatus('Projet ouvert ✓', true)
      } catch (e) { setStatus('Erreur : ' + e.message, true, true) }
    }))
  }
}

projectBtn.addEventListener('click', e => {
  e.stopPropagation()
  if (projectMenu.style.display === 'block') closeMenu(); else openMenu()
})
// Les clics DANS le menu ne remontent pas au document : sinon, quand un item
// reconstruit le menu (innerHTML=''), sa cible est détachée et le test
// « clic à l'extérieur » ci-dessous fermerait le menu par erreur (drill-down).
projectMenu.addEventListener('click', e => e.stopPropagation())
document.addEventListener('click', e => {

newFileBtn.addEventListener('click', newFile)

const railToggle = document.getElementById('rail-toggle')

// ── init ──
async function initProjects() {
  await Store.init()
  examples = await fetch('samples/index.json', { cache: 'no-cache' }).then(r => r.json()).catch(() => [])
  const active = Store.getActiveId()

// ── Output ────────────────────────────────────────────────────────────────
const outputEl   = document.getElementById('output')
const canvasEl   = document.getElementById('canvas')
const outputPane = document.getElementById('output-pane')
const dividerEl  = document.getElementById('divider')
const outputHdr  = document.getElementById('output-header')

// La zone de rendu (sortie + canvas) n'apparaît qu'en exécution/pause ;
// au repos l'éditeur occupe TOUT l'espace.
function setOutputVisible(visible) {
  outputPane.style.display = visible ? '' : 'none'
  if (dividerEl) dividerEl.style.display = visible ? '' : 'none'
  if (visible) {
    restoreSplit()                       // rétablir le découpage choisi
  } else {
    // éditeur plein écran : retirer les bases flex fixes posées par le drag
    editorPane.style.flex = ''
    outputPane.style.flex = ''
  }
}

const runBtn   = document.getElementById('run-btn')
const stopBtn  = document.getElementById('stop-btn')
let   isRunning = false
let   isPaused  = false

const ICON_RUN   = '<svg width="10" height="10" viewBox="0 0 16 16" fill="currentColor"><path d="M3 2l11 6-11 6V2z"/></svg>'
const ICON_STOP  = '<svg width="10" height="10" viewBox="0 0 16 16" fill="currentColor"><rect x="2" y="2" width="12" height="12" rx="2"/></svg>'
const ICON_PAUSE = '<svg width="10" height="10" viewBox="0 0 16 16" fill="currentColor"><rect x="2" y="2" width="4" height="12" rx="1"/><rect x="10" y="2" width="4" height="12" rx="1"/></svg>'
const ICON_RESUME= '<svg width="10" height="10" viewBox="0 0 16 16" fill="currentColor"><path d="M3 2l11 6-11 6V2z"/></svg>'

function setRunning(running) {
  isRunning = running
  if (running) {
    runBtn.classList.add('running')
    runBtn.innerHTML = ICON_STOP + '<span class="btn-label"> Arrêter</span>'
    stopBtn.style.display = 'flex'
    stopBtn.disabled = false
  } else {
    runBtn.classList.remove('running')
    runBtn.innerHTML = ICON_RUN + '<span class="btn-label"> Exécuter</span><kbd>Ctrl+↵</kbd>'
    stopBtn.style.display = 'none'
    stopBtn.disabled = true
    isPaused = false
    stopBtn.innerHTML = ICON_PAUSE + '<span class="btn-label"> Pause</span>'
  }
}

function clearAndStop() {
  try { ollin && ollin.pauseMainLoop() } catch(_) {}
  canvasEl.style.display = 'none'
  outputEl.style.display = 'block'
  if (outputHdr) outputHdr.style.display = 'flex'
  outputEl.textContent   = ''
  outputEl.className     = ''
  outputPane.style.overflow = ''
  setRunning(false)
  setOutputVisible(false)   // retour éditeur plein écran
}

function showOutput(text) {
  canvasEl.style.display = 'none'
  outputEl.style.display = 'block'
  if (outputHdr) outputHdr.style.display = 'flex'
  outputPane.style.overflow = ''
  if (!text) {
    outputEl.textContent = '(aucune sortie)'
    outputEl.className   = ''
  } else if (text.startsWith('error:')) {
    outputEl.textContent = text
    outputEl.className   = 'err'
  } else {
    outputEl.textContent = text
    outputEl.className   = 'ok'
  }
}

// ── Run ───────────────────────────────────────────────────────────────────
let ollin = null

function run() {
  if (!ollin) return
  if (isRunning) { clearAndStop(); return }
  try { ollin.pauseMainLoop() } catch(_) {}
  setRunning(false)
  outputEl.className = ''
  // Afficher la zone AVANT execute : window.width lit le clientWidth de
  // #output-pane (0 si display:none → graphics dimensionné à vide).
  setOutputVisible(true)
  // Pousser tout le projet dans le runtime puis exécuter le POINT D'ENTRÉE.
  flushEditorToFile()
  loadProjectIntoRuntime()
  const code = currentProject ? (currentProject.files[currentProject.entry] ?? '')
                              : view.state.doc.toString()
  const out  = ollin.execute(code)
  if (canvasEl.style.display === 'block') {
    outputPane.style.overflow = 'hidden'
    if (outputHdr) outputHdr.style.display = 'none'
    setRunning(true)
    return
  }
  showOutput(out)
}

runBtn.addEventListener('click', run)
stopBtn.addEventListener('click', () => {
  if (isPaused) {
    try { ollin.resumeMainLoop() } catch(_) {}
    isPaused = false
    stopBtn.innerHTML = ICON_PAUSE + '<span class="btn-label"> Pause</span>'
  } else {
    try { ollin.pauseMainLoop() } catch(_) {}
    isPaused = true
    stopBtn.innerHTML = ICON_RESUME + '<span class="btn-label"> Reprendre</span>'
  }
})

// ── Copy ──────────────────────────────────────────────────────────────────
const copyBtn = document.getElementById('copy-btn')
const ICON_COPY = '<svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="5.5" y="5.5" width="9" height="9" rx="1.5"/><path d="M10.5 5.5V3a1 1 0 00-1-1H3a1 1 0 00-1 1v7a1 1 0 001 1h2.5"/></svg>'
const ICON_OK   = '<svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 8l4 4 6-6"/></svg>'
copyBtn.addEventListener('click', () => {
  navigator.clipboard.writeText(view.state.doc.toString()).then(() => {
    copyBtn.innerHTML = ICON_OK + '<span class="btn-label"> Copié !</span>'
    copyBtn.style.color        = 'var(--green)'
    copyBtn.style.borderColor  = 'var(--green)'
    setTimeout(() => {
      copyBtn.innerHTML = ICON_COPY + '<span class="btn-label"> Copier</span>'
      copyBtn.style.color = ''
      copyBtn.style.borderColor = ''
    }, 1500)
  })
})

// ── Mode autonome (page dédiée plein écran) ─────────────────────────────────
// Écrit le PROJET COMPLET (fichiers + ressources + point d'entrée) dans
// localStorage puis ouvre run.html, qui pousse le tout dans le runtime et
// exécute le point d'entrée (imports multi-fichiers résolus, comme le Run).
// run.html est ouvert avec un cache-buster → toujours la dernière version.
const standaloneBtn = document.getElementById('standalone-btn')
standaloneBtn.addEventListener('click', () => {
  try {
    flushEditorToFile()
    if (currentProject) {
      localStorage.setItem('ollin_run_project', JSON.stringify({
        entry:     currentProject.entry,
        files:     currentProject.files,
        resources: currentProject.resources || {},
      }))
    }
  } catch (_) {}
  window.open('run.html?v=' + Date.now(), '_blank')
})

// ── Recharger + vider le cache ──────────────────────────────────────────────
// Vide le Cache API puis recharge (le code de l'éditeur est conservé dans
// localStorage). Utile pour récupérer un WASM fraîchement déployé.
const reloadBtn = document.getElementById('reload-btn')
reloadBtn.addEventListener('click', () => {
  // Recharge une URL cache-bustée → force une page fraîche (cache HTTP contourné).
  const reload = () => location.replace(location.pathname + '?t=' + Date.now())
  if ('caches' in window) {
    caches.keys()
      .then(ks => Promise.all(ks.map(k => caches.delete(k))))
      .then(reload)
      .catch(reload)
  } else {
    reload()
  }
})

// ── Image upload ──────────────────────────────────────────────────────────
const imgFileInput = document.getElementById('img-file-input')
const imgBtnLabel  = document.getElementById('img-btn-label')
const imgBtn       = document.getElementById('img-btn')

// Reflète le nombre de ressources du projet actif sur le bouton Images.
function updateImgBtn() {
  const n = currentProject ? Object.keys(currentProject.resources || {}).length : 0
  imgBtnLabel.textContent  = n ? (n + ' image' + (n > 1 ? 's' : '')) : 'Images'
  imgBtn.style.borderColor = n ? 'var(--green)' : ''
  imgBtn.style.color       = n ? 'var(--green)' : ''
}

// Les images chargées deviennent des RESSOURCES du projet actif (persistées).
imgFileInput.addEventListener('change', () => {
  const files = Array.from(imgFileInput.files)
  if (!files.length || !currentProject) return
  files.forEach(file => {
    const ext  = file.name.split('.').pop().toLowerCase()
    const name = file.name
    const reader = new FileReader()
    reader.onload = async e => {
      const b64 = (e.target.result.split(',')[1]) ?? ''   // "data:...;base64,xxxx"
      currentProject.resources[name] = { b64, ext }
      await Store.saveProject(currentProject)
      if (ollin && ollin.preloadImage) ollin.preloadImage(name, b64, ext)
      renderResources()
      updateImgBtn()
    }
    reader.readAsDataURL(file)
  })
  imgFileInput.value = ''
})

// Le « ＋ » de la section Ressources ouvre le même sélecteur de fichiers.
newResBtn.addEventListener('click', () => imgFileInput.click())

// ── WASM ──────────────────────────────────────────────────────────────────
const statusEl = document.getElementById('status')

const wasmScript    = document.createElement('script')
const cacheBust     = Date.now()
wasmScript.src      = 'wasm/ollin.js?' + cacheBust
wasmScript.onload   = () => {
  const wasmDir = wasmScript.src.replace(/\?.*$/, '').replace(/[^/]*$/, '')
  OllinModule({
    locateFile: f => wasmDir + f + '?' + cacheBust,
    canvas:   canvasEl,
    print:    () => {},
    printErr: () => {},
  }).then(m => {
    ollin              = m
    runBtn.disabled    = false
    statusEl.textContent = 'Prêt ✓'
    setTimeout(() => { statusEl.textContent = '' }, 2000)
  }).catch(err => {
    statusEl.textContent = 'Erreur WASM : ' + (err?.message ?? err)
  })
}
wasmScript.onerror = () => { statusEl.textContent = 'WASM introuvable' }
document.head.appendChild(wasmScript)

// ── Divider resize ────────────────────────────────────────────────────────
const divider    = document.getElementById('divider')
const editorPane = document.getElementById('editor-pane')
let   dragging   = false

const SPLIT_KEY = 'ollin-pg-split'

function applySplit(pct) {
  editorPane.style.flex = `0 0 ${pct}%`
  outputPane.style.flex = `0 0 ${100 - pct}%`
}

// Rétablit le découpage sauvegardé (appelé quand la zone de rendu réapparaît).
// Au repos (zone masquée) on ne pose AUCUN flex → l'éditeur remplit tout.
function restoreSplit() {
  const pct = parseFloat(localStorage.getItem(SPLIT_KEY))
  if (pct >= 15 && pct <= 85) {
    applySplit(pct)
  } else {
    editorPane.style.flex = ''
    outputPane.style.flex = ''
  }
}

function startDrag(e) {
  dragging = true
  divider.classList.add('dragging')
  e.preventDefault()
}
function moveDrag(clientX, clientY) {
  if (!dragging) return
  const layout = document.getElementById('layout')
  const rect   = layout.getBoundingClientRect()
  const mobile = window.innerWidth <= 640
  const pct = mobile
    ? Math.min(85, Math.max(15, (clientY - rect.top)  / rect.height * 100))
    : Math.min(85, Math.max(15, (clientX - rect.left) / rect.width  * 100))
  applySplit(pct)
}
function endDrag() {
  if (!dragging) return
  dragging = false
  divider.classList.remove('dragging')
  const pct = parseFloat(editorPane.style.flex.split(' ')[2])
  if (!isNaN(pct)) localStorage.setItem(SPLIT_KEY, pct)
}

divider.addEventListener('mousedown',  e => startDrag(e))
document.addEventListener('mousemove', e => moveDrag(e.clientX, e.clientY))
document.addEventListener('mouseup',   () => endDrag())

divider.addEventListener('touchstart', e => startDrag(e), { passive: false })
document.addEventListener('touchmove',  e => { if (dragging) { moveDrag(e.touches[0].clientX, e.touches[0].clientY); e.preventDefault() } }, { passive: false })
document.addEventListener('touchend',  () => endDrag())
</script>

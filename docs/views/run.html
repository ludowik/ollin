<!-- Vue RUN (exécution autonome) — fragment monté par app.js dans #view.
     Canvas partagé (shell) reparenté dans #output-pane par run.js. -->
  <style>
    :root { --bg:#0e0e12; --fg:#e6e6ee; --dim:#8a8a99; --accent:#7c83ff; --border:#2a2a36; }
    * { box-sizing: border-box; }
    /* min-height:0 annule le min-height:100vh du shell (sur mobile 100vh = viewport
       LARGE → fenetre plus haute que l'ecran, defilante). overflow:hidden +
       position:fixed : l'app remplit exactement la fenetre, rien ne defile. */
    html, body { margin:0; height:100%; min-height:0; overflow:hidden; overscroll-behavior:none;
                 background:var(--bg); color:var(--fg);
                 font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace; }
    body { display:flex; flex-direction:column; position:fixed; top:0; right:0; bottom:0; left:0; }
    /* touch-action:none sur la barre (zone non defilante) et le canvas (surface
       graphique interactive) : un glissement qui y demarre n'a pas d'ancetre
       scrollable → sinon iOS panoramique toute la fenetre. Pose directement sur
       ces elements (touch-action ne s'herite pas). #out garde le defilement natif. */
    #bar, canvas { touch-action:none; }

    /* Barre de menu — sous l'encoche (safe-area-inset-top). Ne fait PAS partie
       de la zone graphique. */
    #bar { flex:none; display:flex; align-items:center; gap:12px; font-size:13px;
           padding: calc(8px + env(safe-area-inset-top)) 14px 8px;
           border-bottom:1px solid var(--border); }
    #bar a { color:var(--accent); text-decoration:none; display:flex; align-items:center; gap:6px; }
    #bar a:hover { text-decoration:underline; }
    #bar .sp { flex:1; }
    /* Boutons de la barre (Recharger / Relancer / Pause) : style unique. */
    .bar-btn { display:flex; align-items:center; gap:6px; background:transparent;
               border:1px solid var(--border); color:var(--dim); border-radius:6px;
               padding:5px 9px; font:inherit; font-size:12px; cursor:pointer;
               transition:border-color 0.15s, color 0.15s; }
    .bar-btn:hover { border-color:var(--accent); color:var(--accent); }
    #status { color:var(--dim); font-size:12px; }
    /* Écran étroit : icônes seules (les libellés seraient à l'étroit). */
    @media (max-width: 600px) { #bar { gap:8px; } .bar-label { display:none; } }

    /* Marges de sécurité (coins arrondis / barre home) exclues de la zone. */
    #stage-wrap { flex:1; display:flex; min-height:0;
                  padding: 0 env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left); }

    /* #output-pane = la ZONE GRAPHIQUE mesurée par window.width/height. */
    #output-pane { flex:1; position:relative; overflow:hidden; min-width:0; min-height:0; }
    canvas { display:none; position:absolute; top:0; left:0; right:0; bottom:0; margin:auto; background:#000; }
    #out { display:none; position:absolute; inset:0; white-space:pre-wrap; overflow:auto;
           font-size:13px; line-height:1.5; padding:12px; }
    #out.err { color:#ff6b6b; }
    #out.ok  { color:#b8f5c0; }
  </style>

  <div id="bar">
    <!-- Tout est cadré à droite : Recharger · Relancer · Pause · Éditeur. -->
    <span class="sp"></span>
    <span id="status">Chargement…</span>
    <button id="reload-btn" class="bar-btn" title="Recharger la page (instance WASM neuve, chemin sûr)">
      <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M13.6 8a5.6 5.6 0 1 1-1.6-3.9"/><path d="M13.5 2v3h-3"/></svg>
      <span class="bar-label">Recharger</span>
    </button>
    <button id="relaunch-btn" class="bar-btn" title="Relancer dans la même instance WASM (test de ré-exécution)">
      <svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor"><path d="M4 2.5l9 5.5-9 5.5z"/></svg>
      <span class="bar-label">Relancer</span>
    </button>
    <button id="pause-btn" class="bar-btn" title="Pause / Reprendre">
      <svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor"><rect x="3.5" y="2.5" width="3.2" height="11" rx="1"/><rect x="9.3" y="2.5" width="3.2" height="11" rx="1"/></svg>
      <span class="bar-label">Pause</span>
    </button>
    <!-- Retour à l'éditeur : tout à DROITE, au même coin que le bouton « Plein
         écran » de l'éditeur (le même coin fait l'aller-retour). -->
    <a href="#/playground" title="Retour à l'éditeur">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M9.5 3L5 8l4.5 5"/></svg>
      <span class="bar-label">Éditeur</span>
    </a>
  </div>
  <div id="stage-wrap">
    <div id="output-pane">
      <pre id="out"></pre>
    </div>
  </div>

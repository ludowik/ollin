name: Deploy docs

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'src/**'
      - 'CMakeLists.txt'
      - '.github/workflows/deploy-docs.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Push docs to ollin-docs
        env:
          DOCS_TOKEN: ${{ secrets.DOCS_DEPLOY_TOKEN }}
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

          git clone "https://x-access-token:${DOCS_TOKEN}@github.com/ludowik/ollin-docs.git" /tmp/ollin-docs

          rsync -a --delete --exclude='.git' docs/ /tmp/ollin-docs/

          cd /tmp/ollin-docs
          git add -A
          if git diff --staged --quiet; then
            echo "Nothing to deploy"
          else
            SHORT_SHA=$(cd "$GITHUB_WORKSPACE" && git rev-parse --short HEAD)
            git commit -m "chore: sync docs from ollin@${SHORT_SHA}"
            git push
          fi
